<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국어 → 영어 실전 표현</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--p:#4338CA;--s:#10B981;--e:#E11D48;--bg:#F0F4FF;--txt:#1a1a2e;--muted:#64748B;--border:#E2E8F0;--r:16px;--gap:clamp(12px,3vw,18px)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-text-size-adjust:100%}
.wrap{max-width:720px;margin:0 auto;padding:var(--gap) var(--gap) 80px}

.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--gap)}
.logo{font-size:clamp(16px,4vw,20px);font-weight:800;color:var(--p)}
.logo span{color:var(--e)}
.nav-links{display:flex;gap:6px}
.nav-link{background:#4338CA;color:white;padding:5px 12px;border-radius:50px;font-size:12px;font-weight:700;text-decoration:none}

.tabs{display:flex;gap:6px;margin-bottom:var(--gap);background:white;border-radius:12px;padding:5px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.tab{flex:1;padding:10px;border:none;border-radius:9px;font-size:clamp(13px,3.5vw,14px);font-weight:700;cursor:pointer;transition:all .2s;background:none;color:var(--muted);font-family:inherit;min-height:44px}
.tab.active{background:var(--p);color:white;box-shadow:0 2px 8px rgba(67,56,202,.3)}

.stats-bar{display:flex;gap:10px;margin-bottom:var(--gap)}
.stat-chip{flex:1;background:white;border-radius:12px;padding:12px 8px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.stat-num{font-size:clamp(20px,5vw,26px);font-weight:800;color:var(--p)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}

.cat-chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:var(--gap)}
.cat-chip{padding:6px 14px;border-radius:50px;border:2px solid var(--border);background:white;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--muted);white-space:nowrap}
.cat-chip.active{border-color:var(--p);background:var(--p);color:white}

.search-wrap{position:relative;margin-bottom:var(--gap)}
.search-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.search-input{width:100%;padding:11px 14px 11px 42px;border:2px solid var(--border);border-radius:12px;font-size:15px;font-family:inherit;color:var(--txt);background:white}
.search-input:focus{border-color:var(--p);outline:none}

.phrase-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:560px){.phrase-grid{grid-template-columns:1fr 1fr}}

.pc{background:white;border-radius:var(--r);box-shadow:0 2px 10px rgba(0,0,0,.06);cursor:pointer;transition:transform .15s,box-shadow .15s;overflow:hidden;user-select:none}
.pc:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.pc.known{opacity:.55}
.pc-top{padding:14px 16px 10px}
.pc-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--p);margin-bottom:7px}
.pc-ko{font-size:clamp(13px,3.5vw,15px);font-weight:600;line-height:1.5;color:var(--txt)}
.pc-hint{font-size:11px;color:var(--muted);margin-top:6px}
.pc.revealed .pc-hint{display:none}
.pc-en{font-size:clamp(12px,3vw,13px);line-height:1.6;color:#4F46E5;font-style:italic;display:none;padding:10px 16px 0;border-top:1.5px solid #EEF2FF;margin:0 0 0}
.pc.revealed .pc-en{display:block;padding:10px 16px 0}
.pc-actions{display:flex;justify-content:space-between;align-items:center;padding:8px 16px 12px;min-height:36px}
.pc-tts{background:none;border:none;cursor:pointer;font-size:16px;padding:4px;opacity:.5;display:none}
.pc.revealed .pc-tts{display:block}
.pc-tts:hover{opacity:1}
.pc-known-btn{font-size:11px;font-weight:700;padding:4px 10px;border-radius:50px;border:1.5px solid;cursor:pointer;transition:all .2s;display:none;font-family:inherit}
.pc.revealed .pc-known-btn{display:block}
.pc-known-btn.no{border-color:var(--border);color:var(--muted);background:white}
.pc-known-btn.no:hover{border-color:var(--s);color:var(--s)}
.pc-known-btn.yes{border-color:var(--s);color:var(--s);background:#D1FAE5}

.no-results{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
.no-results .nr-ico{font-size:44px;margin-bottom:10px}

.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap)}
@media(min-width:560px){.theme-grid{grid-template-columns:repeat(4,1fr)}}
.theme-card{border-radius:var(--r);padding:clamp(16px,4vw,22px) 12px;text-align:center;color:white;cursor:pointer;transition:transform .15s,box-shadow .2s;position:relative;overflow:hidden}
.theme-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;background:rgba(255,255,255,.1);border-radius:50%}
.theme-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.theme-emoji{font-size:clamp(28px,8vw,36px);margin-bottom:8px}
.theme-name{font-size:clamp(13px,3.5vw,15px);font-weight:800;margin-bottom:4px}
.theme-count{font-size:11px;opacity:.85}
.theme-done{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.25);border-radius:50px;padding:2px 7px;font-size:10px;font-weight:700}

.theme-detail{display:none}
.theme-detail.show{display:block;animation:fadeIn .2s ease}
.tdh{display:flex;align-items:center;gap:10px;padding:14px 18px;border-radius:var(--r);color:white;margin-bottom:var(--gap);flex-wrap:wrap;gap:10px}
.tdh-back{background:rgba(255,255,255,.2);border:none;color:white;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.tdh-info{flex:1;min-width:100px}
.tdh-name{font-size:clamp(15px,4vw,19px);font-weight:800}
.tdh-sub{font-size:12px;opacity:.85;margin-top:2px}
.tdh-quiz{background:white;border:none;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.tdh-quiz:hover{transform:scale(1.04)}

.theme-phrases{background:white;border-radius:var(--r);box-shadow:0 2px 10px rgba(0,0,0,.06);overflow:hidden}
.tp-item{display:flex;align-items:flex-start;padding:13px 16px;gap:10px;border-bottom:1px solid var(--border)}
.tp-item:last-child{border-bottom:none}
.tp-item:hover{background:#FAFBFF}
.tp-num{font-size:11px;font-weight:700;color:var(--muted);min-width:20px;padding-top:2px;flex-shrink:0}
.tp-ko{flex:1;font-size:clamp(13px,3.5vw,14px);font-weight:600;color:var(--txt);line-height:1.5}
.tp-divider{color:var(--border);padding-top:2px;font-size:13px}
.tp-en{flex:1.2;font-size:clamp(12px,3vw,13px);color:#4F46E5;line-height:1.6;font-style:italic}
.tp-tts{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 0;opacity:.4;flex-shrink:0;padding-top:2px}
.tp-tts:hover{opacity:1}

.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:1000;overflow-y:auto;padding:20px 16px 40px}
.modal-overlay.show{display:block}
.quiz-box{background:white;border-radius:20px;padding:clamp(20px,5vw,28px);max-width:480px;margin:0 auto;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.qz-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.qz-prog-txt{font-size:13px;color:var(--muted);font-weight:600}
.qz-score-live{font-size:13px;font-weight:700;color:var(--s)}
.qz-bar-track{background:var(--border);height:4px;border-radius:50px;overflow:hidden;margin-bottom:20px}
.qz-bar-fill{height:100%;background:linear-gradient(90deg,var(--p),#8B5CF6);border-radius:50px;transition:width .3s ease}
.qz-dir{font-size:10px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;background:#EEF2FF;display:inline-block;padding:3px 9px;border-radius:50px}
.qz-q{font-size:clamp(15px,4vw,18px);font-weight:700;line-height:1.5;margin-bottom:20px;color:var(--txt)}
.qz-opts{display:flex;flex-direction:column;gap:10px}
.qz-opt{padding:13px 16px;border:2px solid var(--border);border-radius:12px;background:white;font-size:clamp(13px,3.5vw,14px);cursor:pointer;text-align:left;transition:all .15s;color:var(--txt);font-family:inherit;line-height:1.5;min-height:50px}
.qz-opt:hover:not(:disabled){border-color:var(--p);background:#EEF2FF}
.qz-opt.correct{border-color:var(--s)!important;background:#D1FAE5!important;color:#065F46}
.qz-opt.wrong{border-color:var(--e)!important;background:#FEE2E2!important;color:#991B1B}
.qz-feedback{font-size:12px;padding:9px 12px;border-radius:8px;margin-top:10px;display:none;line-height:1.5}
.qz-feedback.show{display:block}
.qz-feedback.ok{background:#D1FAE5;color:#065F46}
.qz-feedback.no{background:#FEE2E2;color:#991B1B}
.qz-next{width:100%;margin-top:14px;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--p),#8B5CF6);color:white;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:none}
.qz-next.show{display:block}

.qr{text-align:center}
.qr-emoji{font-size:54px;margin-bottom:12px}
.qr-title{font-size:clamp(18px,5vw,22px);font-weight:800;margin-bottom:6px}
.qr-score{font-size:clamp(30px,8vw,42px);font-weight:800;color:var(--p);margin:10px 0 4px}
.qr-sub{font-size:14px;color:var(--muted);margin-bottom:20px}
.qr-review{text-align:left;margin-bottom:20px;max-height:200px;overflow-y:auto}
.qr-review-title{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.qr-wrong-item{padding:10px 12px;background:#FFF7ED;border:1.5px solid #FED7AA;border-radius:10px;margin-bottom:6px;font-size:13px;line-height:1.6}
.qr-wrong-ko{font-weight:700;color:#92400E;margin-bottom:2px}
.qr-wrong-en{color:#B45309;font-style:italic;font-size:12px}
.qr-btns{display:flex;gap:10px}
.qr-btn{flex:1;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;min-height:48px}
.qr-retry{background:linear-gradient(135deg,var(--p),#8B5CF6);color:white}
.qr-close{background:#F1F5F9;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">한국어 → <span>영어</span></div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">영어UP</a>
      <a href="celpip.html" class="nav-link" style="background:#E11D48">CELPIP</a>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tabDaily" onclick="switchTab('daily')">💬 일상 표현 200</button>
    <button class="tab" id="tabTheme" onclick="switchTab('theme')">🗂️ 테마별 학습</button>
  </div>
  <div id="dailySection"></div>
  <div id="themeSection" style="display:none"></div>
</div>
<div class="modal-overlay" id="quizModal" onclick="handleModalClick(event)">
  <div class="quiz-box" id="quizBox" onclick="event.stopPropagation()"></div>
</div>

  ['보고서 언제까지예요?','When is the report due?'],
  ['잠깐 얘기할 수 있어요?','Do you have a minute? / Can we talk?'],
  ['도움이 필요해요.','I need some help.'],
  ['오늘 좀 일찍 퇴근해도 될까요?','Is it okay if I leave a bit early today?'],
  ['재택근무 가능한가요?','Can I work from home?'],
  ['휴가 신청하고 싶어요.','I\'d like to request time off.'],
  ['실수한 것 같아요.','I think I made a mistake.'],
  ['제가 잘못 이해한 것 같아요.','I think I misunderstood.'],
  ['기한이 언제예요?','What\'s the deadline?'],
  ['오늘 야근해야 해요?','Do I need to work overtime today?'],
  ['진행이 어떻게 되고 있어요?','How is it coming along? / What\'s the progress?'],
  ['다시 한번 확인해볼게요.','Let me double-check that.'],
  ['제가 담당자예요.','I\'m the person in charge. / I\'m handling this.'],
  ['메일 보내드릴게요.','I\'ll send you an email.'],
  ['회의 일정을 잡아도 될까요?','Can we schedule a meeting?'],
 ]},
];

// ============================================================
// STATE
// ============================================================
const st={
  tab:'daily',
  catFilter:'all',
  search:'',
  knownSet:new Set(),
  revealedSet:new Set(),
  currentThemeIdx:null,
  quiz:{
    quizType:'theme',
    dailyCat:null,
    themeIdx:null,
    questions:[],
    current:0,
    score:0,
    wrongItems:[],
    answered:false,
    done:false
  }
};

function loadSt(){
  try{
    const s=JSON.parse(localStorage.getItem('phrases_v1')||'{}');
    if(s.known)s.known.forEach(i=>st.knownSet.add(i));
  }catch(e){}
}
function saveSt(){
  localStorage.setItem('phrases_v1',JSON.stringify({known:[...st.knownSet]}));
}

// TTS
function speak(txt){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='en-CA';u.rate=0.85;u.pitch=1.0;
  const v=window.speechSynthesis.getVoices().find(v=>v.lang.startsWith('en')&&!v.name.toLowerCase().includes('korean'));
  if(v)u.voice=v;
  window.speechSynthesis.speak(u);
}
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}

// ============================================================
// RENDER — DAILY
// ============================================================
const CAT_LABELS={all:'전체',daily:'일상/행동',emotion:'감정/기분',opinion:'의견/생각',situation:'상황/관계'};
const CAT_ICONS={all:'📋',daily:'🗓️',emotion:'💭',opinion:'🤔',situation:'🤝'};

function renderDaily(){
  const filtered=DAILY.filter((p,i)=>{
    const matchCat=st.catFilter==='all'||p[2]===st.catFilter;
    const matchSearch=!st.search||p[0].includes(st.search)||p[1].toLowerCase().includes(st.search.toLowerCase());
    return matchCat&&matchSearch;
  });

  let html=`<div class="stats-bar">
    <div class="stat-chip"><div class="stat-num">${st.knownSet.size}</div><div class="stat-lbl">외웠어 ✓</div></div>
    <div class="stat-chip"><div class="stat-num">${DAILY.length-st.knownSet.size}</div><div class="stat-lbl">남은 표현</div></div>
    <div class="stat-chip"><div class="stat-num">${DAILY.length}</div><div class="stat-lbl">전체</div></div>
  </div>
  <div class="cat-chips">`;
  Object.entries(CAT_LABELS).forEach(([k,v])=>{
    html+=`<button class="cat-chip${st.catFilter===k?' active':''}" onclick="setCat('${k}')">${CAT_ICONS[k]} ${v}</button>`;
  });
  const catPool=DAILY.filter(p=>st.catFilter==='all'||p[2]===st.catFilter);
  const bestDScore=getDailyBestScore(st.catFilter);
  const qTotal=Math.min(10,catPool.length);
  html+=`</div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:var(--gap);background:white;border-radius:12px;padding:10px 14px;box-shadow:0 2px 8px rgba(0,0,0,.05)">
    <div style="flex:1">
      <div style="font-size:13px;font-weight:700;color:var(--txt)">${CAT_ICONS[st.catFilter]} ${CAT_LABELS[st.catFilter]} 시험</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">${catPool.length}개 중 랜덤 ${qTotal}문제${bestDScore!==null?' · 최고 '+bestDScore+'/'+qTotal+'점':''}</div>
    </div>
    <button onclick="startDailyQuiz('${st.catFilter}')" style="padding:9px 18px;border:none;border-radius:10px;background:linear-gradient(135deg,#4338CA,#8B5CF6);color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">📝 시험보기</button>
  </div>
  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input class="search-input" placeholder="한국어 또는 영어로 검색..." value="${st.search}" oninput="setSearch(this.value)">
  </div>`;

  if(!filtered.length){
    html+=`<div class="no-results"><div class="nr-ico">🔎</div>검색 결과가 없어요.</div>`;
  } else {
    html+=`<div class="phrase-grid">`;
    filtered.forEach((p,fi)=>{
      const i=DAILY.indexOf(p);
      const isRevealed=st.revealedSet.has(i);
      const isKnown=st.knownSet.has(i);
      html+=`<div class="pc${isRevealed?' revealed':''}${isKnown?' known':''}" id="pc${i}" onclick="revealCard(${i})">
        <div class="pc-top">
          <div class="pc-cat">${CAT_ICONS[p[2]]} ${CAT_LABELS[p[2]]}</div>
          <div class="pc-ko">${p[0]}</div>
          <div class="pc-hint">탭하면 영어 표현 보기 👆</div>
          <div class="pc-en">${p[1]}</div>
        </div>
        <div class="pc-actions">
          <button class="pc-tts" onclick="event.stopPropagation();speak('${p[1].replace(/'/g,"\\'").split(' / ')[0]}')" title="발음 듣기">🔊</button>
          <button class="pc-known-btn ${isKnown?'yes':'no'}" onclick="event.stopPropagation();toggleKnown(${i})">${isKnown?'✓ 외웠어':'외웠어 ✓'}</button>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }
  document.getElementById('dailySection').innerHTML=html;
}

window.setCat=function(cat){st.catFilter=cat;renderDaily();};
window.setSearch=function(v){st.search=v;renderDaily();};
window.revealCard=function(i){
  st.revealedSet.add(i);
  const el=document.getElementById('pc'+i);
  if(el)el.classList.add('revealed');
};
window.toggleKnown=function(i){
  if(st.knownSet.has(i))st.knownSet.delete(i);
  else st.knownSet.add(i);
  saveSt();
  renderDaily();
};

// ============================================================
// RENDER — THEME
// ============================================================
function renderTheme(){
  if(st.currentThemeIdx===null){
    renderThemeGrid();
  } else {
    renderThemeDetail(st.currentThemeIdx);
  }
}

function renderThemeGrid(){
  let html=`<div class="theme-grid">`;
  THEMES.forEach((t,i)=>{
    const bestScore=getBestScore(i);
    html+=`<div class="theme-card" style="background:${t.gradient}" onclick="openTheme(${i})">
      ${bestScore!==null?`<div class="theme-done">${bestScore}/${Math.min(10,t.phrases.length)}점</div>`:''}
      <div class="theme-emoji">${t.emoji}</div>
      <div class="theme-name">${t.name}</div>
      <div class="theme-count">${t.phrases.length}개 표현</div>
    </div>`;
  });
  html+=`</div>`;
  document.getElementById('themeSection').innerHTML=html;
}

function getBestScore(idx){
  try{
    const scores=JSON.parse(localStorage.getItem('phrase_scores')||'{}');
    return scores[idx]??null;
  }catch(e){return null;}
}
function saveScore(idx,score){
  try{
    const scores=JSON.parse(localStorage.getItem('phrase_scores')||'{}');
    if(scores[idx]===undefined||score>scores[idx])scores[idx]=score;
    localStorage.setItem('phrase_scores',JSON.stringify(scores));
  }catch(e){}
}
function getDailyBestScore(cat){
  try{
    const scores=JSON.parse(localStorage.getItem('phrase_daily_scores')||'{}');
    return scores[cat]??null;
  }catch(e){return null;}
}
function saveDailyScore(cat,score){
  try{
    const scores=JSON.parse(localStorage.getItem('phrase_daily_scores')||'{}');
    if(scores[cat]===undefined||score>scores[cat])scores[cat]=score;
    localStorage.setItem('phrase_daily_scores',JSON.stringify(scores));
  }catch(e){}
}

window.openTheme=function(i){
  st.currentThemeIdx=i;
  renderThemeDetail(i);
};

function renderThemeDetail(i){
  const t=THEMES[i];
  let html=`<div class="theme-detail show">
    <div class="tdh" style="background:${t.gradient}">
      <button class="tdh-back" onclick="closeTheme()">← 뒤로</button>
      <div class="tdh-info">
        <div class="tdh-name">${t.emoji} ${t.name}</div>
        <div class="tdh-sub">${t.phrases.length}개 표현 · 탭하면 발음 들어요 🔊</div>
      </div>
      <button class="tdh-quiz" onclick="startQuiz(${i})" style="color:${t.color}">📝 시험보기</button>
    </div>
    <div class="theme-phrases">`;
  t.phrases.forEach((p,pi)=>{
    const enSafe=p[1].replace(/'/g,"\\'");
    html+=`<div class="tp-item">
      <div class="tp-num">${pi+1}</div>
      <div class="tp-ko">${p[0]}</div>
      <div class="tp-divider">→</div>
      <div class="tp-en">${p[1]}</div>
      <button class="tp-tts" onclick="speak('${enSafe.split(' / ')[0]}')" title="발음 듣기">🔊</button>
    </div>`;
  });
  html+=`</div></div>`;
  document.getElementById('themeSection').innerHTML=html;
}

window.closeTheme=function(){
  st.currentThemeIdx=null;
  renderThemeGrid();
};

// ============================================================
// QUIZ
// ============================================================
function shuffle(arr){return [...arr].sort(()=>Math.random()-.5);}

window.startQuiz=function(themeIdx){
  const t=THEMES[themeIdx];
  const shuffled=shuffle(t.phrases);
  const pool=shuffled.slice(0,Math.min(10,shuffled.length));
  st.quiz={
    quizType:'theme',dailyCat:null,
    themeIdx,
    questions:pool.map((p,qi)=>{
      const dir=Math.random()>.5?'ko2en':'en2ko';
      const wrongPool=t.phrases.filter(x=>x!==p);
      const wrongs=shuffle(wrongPool).slice(0,3);
      const opts=shuffle([p,...wrongs]);
      return{p,dir,opts,correct:opts.indexOf(p),answered:false,selected:null};
    }),
    current:0,score:0,wrongItems:[],answered:false,done:false
  };
  renderQuizQuestion();
  document.getElementById('quizModal').classList.add('show');
};

window.startDailyQuiz=function(cat){
  const pool=DAILY.filter(p=>cat==='all'||p[2]===cat);
  const shuffled=shuffle(pool);
  const qPool=shuffled.slice(0,Math.min(10,shuffled.length));
  st.quiz={
    quizType:'daily',dailyCat:cat,
    themeIdx:null,
    questions:qPool.map(p=>{
      const dir=Math.random()>.5?'ko2en':'en2ko';
      const wrongPool=pool.filter(x=>x!==p);
      const wrongs=shuffle(wrongPool).slice(0,3);
      const opts=shuffle([p,...wrongs]);
      return{p,dir,opts,correct:opts.indexOf(p),answered:false,selected:null};
    }),
    current:0,score:0,wrongItems:[],answered:false,done:false
  };
  renderQuizQuestion();
  document.getElementById('quizModal').classList.add('show');
};

function renderQuizQuestion(){
  const q=st.quiz;
  if(q.done){renderQuizResult();return;}
  const cur=q.questions[q.current];
  const pct=((q.current)/q.questions.length)*100;

  let html=`<div class="qz-hdr">
    <span class="qz-prog-txt">${q.current+1} / ${q.questions.length}</span>
    <span class="qz-score-live">✓ ${q.score}개 정답</span>
  </div>
  <div class="qz-bar-track"><div class="qz-bar-fill" style="width:${pct}%"></div></div>
  <div class="qz-dir">${cur.dir==='ko2en'?'🇰🇷 한국어 → 영어':'🇺🇸 영어 → 한국어'}</div>
  <div class="qz-q">${cur.dir==='ko2en'?cur.p[0]:cur.p[1]}</div>
  <div class="qz-opts">`;
  cur.opts.forEach((opt,oi)=>{
    const display=cur.dir==='ko2en'?opt[1]:opt[0];
    let cls='qz-opt';
    if(cur.answered){
      if(oi===cur.correct)cls+=' correct';
      else if(oi===cur.selected)cls+=' wrong';
    }
    html+=`<button class="qz-opt${cur.answered?(oi===cur.correct?' correct':oi===cur.selected?' wrong':''):''}"
      onclick="answerQuiz(${oi})" ${cur.answered?'disabled':''}>${display}</button>`;
  });
  html+=`</div>`;
  if(cur.answered){
    const isRight=cur.selected===cur.correct;
    html+=`<div class="qz-feedback show ${isRight?'ok':'no'}">${isRight?'✅ 정답!':'❌ 오답. 정답: '+cur.opts[cur.correct][cur.dir==='ko2en'?1:0]}</div>`;
  }
  html+=`<button class="qz-next${cur.answered?' show':''}" onclick="nextQuizQuestion()">${q.current+1<q.questions.length?'다음 문제 →':'결과 보기 →'}</button>`;
  document.getElementById('quizBox').innerHTML=html;
}

window.answerQuiz=function(oi){
  const q=st.quiz;
  const cur=q.questions[q.current];
  if(cur.answered)return;
  cur.answered=true;
  cur.selected=oi;
  if(oi===cur.correct){q.score++;}
  else{q.wrongItems.push(cur.p);}
  renderQuizQuestion();
};

window.nextQuizQuestion=function(){
  const q=st.quiz;
  if(q.current+1>=q.questions.length){
    q.done=true;
    if(q.quizType==='daily')saveDailyScore(q.dailyCat,q.score);
    else saveScore(q.themeIdx,q.score);
    renderQuizResult();
  } else {
    q.current++;
    renderQuizQuestion();
  }
};

function renderQuizResult(){
  const q=st.quiz;
  const total=q.questions.length;
  const pct=Math.round(q.score/total*100);
  const emoji=pct===100?'🏆':pct>=80?'🎉':pct>=60?'💪':'📖';
  const msg=pct===100?'완벽해요!':pct>=80?'아주 잘했어요!':pct>=60?'잘했어요!':'모범 표현을 다시 공부해보세요.';
  let html=`<div class="qr">
    <div class="qr-emoji">${emoji}</div>
    <div class="qr-title">${msg}</div>
    <div class="qr-score">${q.score} / ${total}</div>
    <div class="qr-sub">${q.quizType==='daily'?(CAT_LABELS[q.dailyCat]||'전체')+' 카테고리':THEMES[q.themeIdx].name+' 테마'} · 정답률 ${pct}%</div>`;
  if(q.wrongItems.length){
    html+=`<div class="qr-review">
      <div class="qr-review-title">❌ 틀린 표현 복습 (${q.wrongItems.length}개)</div>`;
    q.wrongItems.forEach(p=>{
      html+=`<div class="qr-wrong-item"><div class="qr-wrong-ko">${p[0]}</div><div class="qr-wrong-en">${p[1]}</div></div>`;
    });
    html+=`</div>`;
  }
  const retryFn=q.quizType==='daily'?`startDailyQuiz('${q.dailyCat}')`:`startQuiz(${q.themeIdx})`;
  html+=`<div class="qr-btns">
    <button class="qr-btn qr-retry" onclick="${retryFn}">🔄 다시 풀기</button>
    <button class="qr-btn qr-close" onclick="closeQuiz()">닫기</button>
  </div></div>`;
  document.getElementById('quizBox').innerHTML=html;
}

window.closeQuiz=function(){
  document.getElementById('quizModal').classList.remove('show');
  if(st.quiz.quizType==='daily')renderDaily();
  else renderTheme();
};
window.handleModalClick=function(e){
  if(e.target.id==='quizModal')closeQuiz();
};

// ============================================================
// TAB / INIT
// ============================================================
window.switchTab=function(tab){
  st.tab=tab;
  document.getElementById('tabDaily').className='tab'+(tab==='daily'?' active':'');
  document.getElementById('tabTheme').className='tab'+(tab==='theme'?' active':'');
  document.getElementById('dailySection').style.display=tab==='daily'?'':'none';
  document.getElementById('themeSection').style.display=tab==='theme'?'':'none';
  if(tab==='daily')renderDaily();
  else renderTheme();
};

loadSt();
renderDaily();
</script>
</body>
</html>
